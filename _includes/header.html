{%- assign page_paths = site.header_pages | default: default_paths -%}
<header>
  <div class="menu">

    <ul class="header-list icon-list">
    </ul>
  
    <ul class="header-list page-list">
      {%- for path in page_paths -%}
        {%- assign my_page = site.pages | where: "path", path | first -%}
        {%- if my_page.title -%}
        <li>
          <a href="{{ my_page.url | relative_url }}" style="text-decoration: none; color: inherit;"
              class="{% if page.url == my_page.url %}active{% endif %}">
            {{ my_page.title | escape }}
          </a>
        </li>
        {%- endif -%}
      {%- endfor -%}
    </ul>
  </div>
</header>
